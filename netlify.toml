
[build]
  command = "npm run build"
  publish = "dist"

[[redirects]]
  from     = "/api/*"
  to       = "https://prueba-flexxus-backend-production.up.railway.app/api/:splat"
  status   = 200
  force    = true

[[redirects]]
  from     = "/*"
  to       = "/index.html"
  status   = 200
  force    = false
